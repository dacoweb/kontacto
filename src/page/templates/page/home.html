{% extends "layout/base.html" %}

{% load static %}

{% block title %}Inicio{% endblock %}

{% block content %}

<div class="flex items-center justify-center px-4 pt-6">
    <div id="alert" class="hidden w-full max-w-3xl items-center justify-between p-4 mb-4 text-blue-800 bg-blue-100 rounded-lg" role="alert">
        <div>
            <span id="alert-title" class="font-medium"></span> 
            <span id="alert-msg"></span></span> 
        </div>
        <button id="btn-alert-close" type="button" class="text-black-500 hover:text-black-900">
            <span class="sr-only">Cerrar</span>✕
        </button>
    </div>
</div>
    
<div class="flex items-center justify-center px-4 pt-6">

    <div class="w-full max-w-3xl bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
        <div class="flex border-b border-gray-200">
            <button id="tab-register"
                class="tab-button flex-1 px-4 py-3 text-sm font-medium transition bg-white text-gray-900 border-b-2 border-blue-500">
                Registrarse
            </button>

            <button id="tab-list"
                class="tab-button flex-1 px-4 py-3 text-sm font-medium transition text-gray-500 hover:text-gray-700">
                Lista de registros
            </button>

        </div>

        <div class="p-6">
            <div id="content-register" class="tab-content">
                <form id="contactForm" class="space-y-5">
                <div>
                    <label class="block text-sm text-gray-700 mb-1">Nombre</label>
                    <input name="name" type="text" placeholder="Ingrese su nombre"
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-black focus:ring-1 focus:ring-black outline-none transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-700 mb-1">Correo Electrónico</label>
                    <input name="email" type="email" placeholder="correo@ejemplo.com"
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-black focus:ring-1 focus:ring-black outline-none transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-700 mb-1">Asunto</label>
                    <input name="subject" type="text" placeholder="Motivo del mensaje"
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-black focus:ring-1 focus:ring-black outline-none transition">
                </div>

                <div>
                    <label class="block text-sm text-gray-700 mb-1">Mensaje</label>
                    <textarea name="message" rows="4" placeholder="Escribe tu mensaje..."
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-200 focus:border-black focus:ring-1 focus:ring-black outline-none transition resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-black text-white py-2.5 rounded-lg hover:bg-gray-800 transition">
                    Enviar mensaje
                </button>
                </form>
            </div>
            <div id="content-list" class="tab-content hidden">
                <div class="space-y-3">
                    <ul id="messageList" class="max-w-md space-y-2 text-body list-decimal list-inside mt-3"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extrajs %}
<script>
    const LIST_URL = "{% url 'contact-list' %}";
    const STORE_URL = "{% url 'contact-store' %}";
</script>
<script src="{% static 'assets/js/page.js' %}" type="application/javascript"></script>
{% endblock %}
